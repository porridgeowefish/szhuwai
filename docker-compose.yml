version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    container_name: szhuwai-backend
    volumes:
      - ./backend/temp_tracks:/app/temp_tracks

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    container_name: szhuwai-frontend
