# CI/CD 工作流：构建 Docker 镜像并推送到阿里云容器仓库
name: Build and Push to Aliyun CR

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 设置环境变量
env:
  REGISTRY: crpi-zlz2p5f3e8ahmufb.cn-shenzhen.personal.cr.aliyuncs.com
  NAMESPACE: szhuwai
  IMAGE_NAME: szhuwai

jobs:
  # CI: 构建并推送镜像
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录阿里云容器仓库
      - name: Login to Aliyun CR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_CR_USERNAME }}
          password: ${{ secrets.ALIYUN_CR_PASSWORD }}

      # 4. 构建并推送 Docker 镜像
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # CD: 部署到云服务器
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    steps:
      # 1. 检出代码（用于获取部署脚本）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 部署到服务器
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "登录阿里云容器仓库..."
            echo "${{ secrets.ALIYUN_CR_PASSWORD }}" | docker login ${{ env.REGISTRY }} --username=${{ secrets.ALIYUN_CR_USERNAME }} --password-stdin

            echo "停止并删除旧容器（如存在）..."
            docker stop szhuwai 2>/dev/null || true
            docker rm szhuwai 2>/dev/null || true

            echo "拉取新镜像..."
            docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

            echo "启动新容器..."
            docker run -d \
              --name szhuwai \
              --restart unless-stopped \
              -p 8000:8000 \
              -e LOG_LEVEL=INFO \
              -e PYTHONUNBUFFERED=1 \
              ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

            echo "清理旧镜像..."
            docker image prune -f

            echo "容器状态:"
            docker ps | grep szhuwai