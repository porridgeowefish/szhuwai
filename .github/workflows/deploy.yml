# CI/CD 工作流：构建 Docker 镜像并推送到阿里云容器仓库
name: Build and Push to Aliyun CR

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 设置环境变量
env:
  REGISTRY: crpi-zlz2p5f3e8ahmufb.cn-shenzhen.personal.cr.aliyuncs.com
  NAMESPACE: szhuwai
  BACKEND_IMAGE: szhuwai-backend
  FRONTEND_IMAGE: szhuwai-frontend

jobs:
  # CI: 构建并推送后端镜像
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun CR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_CR_USERNAME }}
          password: ${{ secrets.ALIYUN_CR_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # CI: 构建并推送前端镜像
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun CR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_CR_USERNAME }}
          password: ${{ secrets.ALIYUN_CR_PASSWORD }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # CD: 部署到云服务器
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload docker-compose.prod.yml
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "docker-compose.prod.yml"
          target: "/home/${{ secrets.SERVER_USER }}/app"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd ~/app

            echo "登录阿里云容器仓库..."
            echo "${{ secrets.ALIYUN_CR_PASSWORD }}" | docker login ${{ env.REGISTRY }} --username=${{ secrets.ALIYUN_CR_USERNAME }} --password-stdin

            echo "拉取新镜像..."
            docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

            echo "停止旧服务..."
            docker compose -f docker-compose.prod.yml down || true

            echo "启动新服务..."
            export REGISTRY=${{ env.REGISTRY }}
            export NAMESPACE=${{ env.NAMESPACE }}
            export BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}
            export FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.prod.yml up -d

            echo "等待服务启动..."
            sleep 5

            echo "健康检查..."
            curl -f http://localhost:8000/health || echo "后端健康检查失败"
            curl -f http://localhost/health || echo "前端健康检查失败"

            echo "清理旧镜像..."
            docker image prune -f

            docker compose -f docker-compose.prod.yml ps
